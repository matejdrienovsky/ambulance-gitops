apiVersion: apps/v1
kind: Deployment
metadata:
  name: xdrienovskym2-ambulance-ufe-deployment      
spec:
  replicas: 2
  selector:
    matchLabels:
        pod: xdrienovskym2-ambulance-ufe-label    
                                 
               
  template:                   
    metadata:
      labels:
        pod: xdrienovskym2-ambulance-ufe-label  
    spec:
      containers:
      - name: ambulance-ufe-container
        image: matejdrienovsky/ambulance-ufe
        imagePullPolicy: Always

        ports:
        - name: http
          containerPort: 8080     

        resources:                 
                                    
            requests:
                memory: "32M"
                cpu: "0.1"
            limits:
                memory: "320M"
                cpu: "0.3"